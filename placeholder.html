<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>OSINT Pipeline Placeholder</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #64748b;
      --accent: #0f766e;
      --accent-soft: #ccfbf1;
      --ok: #166534;
      --warn: #b45309;
      --border: #dbe3ee;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: radial-gradient(circle at 0% 0%, #e7f4ff, var(--bg) 35%), var(--bg);
      color: var(--text);
      font: 15px/1.5 "Segoe UI", "Helvetica Neue", Helvetica, Arial, sans-serif;
    }

    .wrap {
      max-width: 960px;
      margin: 32px auto;
      padding: 0 16px 40px;
    }

    .hero {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px;
      box-shadow: 0 10px 24px rgba(15, 23, 42, 0.05);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 24px;
    }

    p {
      margin: 0 0 14px;
      color: var(--muted);
    }

    form {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 12px;
      margin-top: 16px;
    }

    label {
      display: block;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 4px;
    }

    input {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 12px;
      outline: none;
      background: #fff;
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-soft);
    }

    .actions {
      grid-column: 1 / -1;
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    button {
      border: 0;
      border-radius: 10px;
      background: var(--accent);
      color: white;
      padding: 10px 14px;
      font-weight: 600;
      cursor: pointer;
    }

    button[disabled] {
      opacity: 0.65;
      cursor: wait;
    }

    .ghost {
      background: #e2e8f0;
      color: #1e293b;
    }

    .chips {
      margin-top: 14px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .chip {
      background: #f1f5f9;
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 4px 10px;
      font-size: 12px;
    }

    .grid {
      margin-top: 16px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 12px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
    }

    .card h3 {
      margin: 0 0 8px;
      font-size: 14px;
    }

    .k {
      color: var(--muted);
      font-size: 12px;
    }

    .v {
      font-weight: 600;
      margin-bottom: 8px;
    }

    .status {
      margin-top: 12px;
      padding: 8px 10px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: #f8fafc;
      font-size: 13px;
      color: var(--muted);
    }

    .status.ok { color: var(--ok); }
    .status.warn { color: var(--warn); }

    pre {
      margin: 12px 0 0;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: #0b1220;
      color: #e2e8f0;
      overflow: auto;
      max-height: 340px;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="hero">
      <h1>Identity Resolution Placeholder</h1>
      <p>
        Enter a person name to trigger the full OSINT flow (Maigret + Academic + GitHub).
        This page is a placeholder UI and can also show sample data if the API is unavailable.
      </p>

      <form id="pipeline-form">
        <div>
          <label for="name">Name (required)</label>
          <input id="name" name="name" type="text" placeholder="Elon Musk" required />
        </div>

        <div>
          <label for="username">Username (optional)</label>
          <input id="username" name="username" type="text" placeholder="elonmusk" />
        </div>

        <div>
          <label for="institution">Institution (optional)</label>
          <input id="institution" name="institution" type="text" placeholder="SpaceX" />
        </div>

        <div class="actions">
          <button id="run-btn" type="submit">Run Full Pipeline</button>
          <button id="mock-btn" type="button" class="ghost">Load Dummy Response</button>
        </div>
      </form>

      <div class="chips">
        <span class="chip">Source: Maigret</span>
        <span class="chip">Source: Academic</span>
        <span class="chip">Source: GitHub</span>
      </div>

      <div id="status" class="status">Waiting for input.</div>
      <div id="source-cards" class="grid"></div>
      <pre id="raw-json">{}</pre>
    </section>
  </main>

  <script>
    const form = document.getElementById("pipeline-form");
    const runBtn = document.getElementById("run-btn");
    const mockBtn = document.getElementById("mock-btn");
    const statusEl = document.getElementById("status");
    const cardsEl = document.getElementById("source-cards");
    const rawEl = document.getElementById("raw-json");

    const SOURCE_ORDER = ["maigret", "academic", "github"];

    function setStatus(text, type) {
      statusEl.textContent = text;
      statusEl.className = "status" + (type ? " " + type : "");
    }

    function renderSources(summary) {
      const list = Array.isArray(summary.sources) ? summary.sources : [];
      const byName = Object.fromEntries(list.map(s => [String(s.source || "").toLowerCase(), s]));

      cardsEl.innerHTML = "";

      SOURCE_ORDER.forEach((source) => {
        const s = byName[source] || { source, claims: 0, success: false, error: "No data", elapsed_seconds: 0 };
        const card = document.createElement("article");
        card.className = "card";
        card.innerHTML = `
          <h3>${source}</h3>
          <div class="k">Claims</div>
          <div class="v">${s.claims ?? 0}</div>
          <div class="k">Success</div>
          <div class="v">${s.success ? "Yes" : "No"}</div>
          <div class="k">Error</div>
          <div class="v">${s.error || "-"}</div>
        `;
        cardsEl.appendChild(card);
      });
    }

    function render(summary) {
      renderSources(summary);
      rawEl.textContent = JSON.stringify(summary, null, 2);
      const count = summary.golden_records_count ?? 0;
      setStatus(`Pipeline complete. Golden records: ${count}`, "ok");
    }

    function getDummy() {
      return {
        run_id: "placeholder-run",
        username: "elonmusk",
        total_claims: 37,
        total_clusters: 3,
        golden_records_count: 3,
        sources: [
          { source: "maigret", claims: 27, success: true, error: null, elapsed_seconds: 12.4 },
          { source: "academic", claims: 4, success: true, error: null, elapsed_seconds: 3.1 },
          { source: "github", claims: 1, success: true, error: null, elapsed_seconds: 0.5 }
        ],
        kafka: { published: 3, failed: 0 },
        errors: [],
        golden_records: [
          { entity_id: "ent-1", confidence_score: 0.87, resolution_method: "probabilistic", alias_count: 9, source_count: 3, quarantined: false },
          { entity_id: "ent-2", confidence_score: 0.66, resolution_method: "probabilistic", alias_count: 3, source_count: 1, quarantined: false },
          { entity_id: "ent-3", confidence_score: 0.35, resolution_method: "deterministic", alias_count: 1, source_count: 1, quarantined: true }
        ]
      };
    }

    async function runPipeline(formData) {
      const params = new URLSearchParams();
      if (formData.name) params.set("name", formData.name);
      if (formData.username) params.set("username", formData.username);
      if (formData.institution) params.set("institution", formData.institution);

      const url = `/resolve_identity?${params.toString()}`;
      const res = await fetch(url, { method: "GET" });
      if (!res.ok) {
        const txt = await res.text();
        throw new Error(`HTTP ${res.status}: ${txt}`);
      }
      return await res.json();
    }

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      const name = document.getElementById("name").value.trim();
      const username = document.getElementById("username").value.trim();
      const institution = document.getElementById("institution").value.trim();

      if (!name) {
        setStatus("Name is required.", "warn");
        return;
      }

      runBtn.disabled = true;
      setStatus("Running full pipeline...", "");

      try {
        const summary = await runPipeline({ name, username, institution });
        render(summary);
      } catch (error) {
        setStatus("API unavailable. Showing dummy placeholder response.", "warn");
        render(getDummy());
        console.error(error);
      } finally {
        runBtn.disabled = false;
      }
    });

    mockBtn.addEventListener("click", () => {
      setStatus("Loaded dummy response.", "ok");
      render(getDummy());
    });
  </script>
</body>
</html>
