version: '3.8'

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"
    healthcheck:
      test: ["CMD", "bash", "-c", "echo srvr | nc localhost 2181 | grep Mode"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181

      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

      # Retention: 7 days for OSINT events
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # Topic initialisation (run-once container)
  kafka-init:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        echo "Creating topics…"

        # Maigret raw events
        kafka-topics --create --if-not-exists --topic osint.raw.maigret.v1 \
          --bootstrap-server kafka:9092 --partitions 3 --replication-factor 1
        kafka-topics --create --if-not-exists --topic osint.raw.maigret.test.v1 \
          --bootstrap-server kafka:9092 --partitions 1 --replication-factor 1
        kafka-topics --create --if-not-exists --topic osint.probe.maigret.v1 \
          --bootstrap-server kafka:9092 --partitions 1 --replication-factor 1

        # Identity pipeline topics (handover.md §2)
        kafka-topics --create --if-not-exists --topic osint.normalized \
          --bootstrap-server kafka:9092 --partitions 3 --replication-factor 1
        kafka-topics --create --if-not-exists --topic identity.resolved \
          --bootstrap-server kafka:9092 --partitions 6 --replication-factor 1
        kafka-topics --create --if-not-exists --topic identity.quarantine \
          --bootstrap-server kafka:9092 --partitions 3 --replication-factor 1
        kafka-topics --create --if-not-exists --topic identity.conflicts \
          --bootstrap-server kafka:9092 --partitions 3 --replication-factor 1
        kafka-topics --create --if-not-exists --topic persona.reports \
          --bootstrap-server kafka:9092 --partitions 3 --replication-factor 1
        kafka-topics --create --if-not-exists --topic audit.events \
          --bootstrap-server kafka:9092 --partitions 3 --replication-factor 1

        # DLQ topics (handover.md §7)
        kafka-topics --create --if-not-exists --topic dlq.phase2.ingest_failures \
          --bootstrap-server kafka:9092 --partitions 1 --replication-factor 1
        kafka-topics --create --if-not-exists --topic dlq.phase3.synthesis_failures \
          --bootstrap-server kafka:9092 --partitions 1 --replication-factor 1
        kafka-topics --create --if-not-exists --topic dlq.schema_version_unsupported \
          --bootstrap-server kafka:9092 --partitions 1 --replication-factor 1

        echo "All topics ready:"
        kafka-topics --list --bootstrap-server kafka:9092
    restart: "no"

  spiderfoot:
    image: ctdc/spiderfoot:latest
    container_name: spiderfoot
    platform: linux/amd64
    command: ["sf.py", "-l", "0.0.0.0:5001"]
    ports:
      - "5001:5001"
    volumes:
      - spiderfoot_data:/root/.spiderfoot
    restart: unless-stopped

volumes:
  spiderfoot_data:
    name: spiderfoot_data